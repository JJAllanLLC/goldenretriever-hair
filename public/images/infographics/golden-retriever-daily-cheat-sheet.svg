<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1910" width="1000" height="1910">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2438"/>
      <stop offset="100%" style="stop-color:#243352"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1F2A44" flood-opacity="0.07"/>
    </filter>
    <style type="text/css"><![CDATA[
      .t { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .h1 { font-size: 40px; font-weight: 800; fill: #F7F4EF; letter-spacing: -0.02em; }
      .sub { font-size: 18px; font-weight: 600; fill: #d4a84a; letter-spacing: 0.06em; text-transform: uppercase; }
      .sec-title { font-size: 30px; font-weight: 800; fill: #1F2A44; letter-spacing: -0.02em; }
      .food-label { font-size: 17px; font-weight: 800; fill: #1F2A44; }
      .line { font-size: 16px; font-weight: 500; fill: #2c3a52; }
      .rhythm-lbl { font-size: 12px; font-weight: 700; fill: #C89B3C; text-transform: uppercase; letter-spacing: 0.1em; }
      .rhythm { font-size: 15px; font-weight: 500; fill: #2c3a52; }
      .legend { font-size: 13px; font-weight: 600; fill: #3d4d66; letter-spacing: 0.02em; }
      .food-h { font-size: 22px; font-weight: 800; fill: #1F2A44; }
      .food-note { font-size: 11px; font-weight: 500; fill: #5a6a82; font-style: italic; }
      .cup-num { font-size: 15px; font-weight: 800; fill: #1F2A44; }
      .cup-num-f { font-size: 15px; font-weight: 700; fill: #6b5c3a; }
      .mistake-lbl { font-size: 12px; font-weight: 800; fill: #1F2A44; text-transform: uppercase; letter-spacing: 0.1em; }
      .mistake { font-size: 15px; font-weight: 700; fill: #5c3d2a; }
      .warn { font-size: 18px; }
      .issues-h { font-size: 22px; font-weight: 800; fill: #1F2A44; }
      .issues-box { fill: #ebe6dd; stroke: #1F2A44; stroke-width: 1.5; }
      .bullet { font-size: 15px; font-weight: 600; fill: #1F2A44; }
      .bullet-mark { fill: #C89B3C; font-size: 17px; font-weight: 800; }
      .foot { font-size: 20px; font-weight: 800; fill: #C89B3C; letter-spacing: 0.02em; }
      .foot-sub { font-size: 13px; font-weight: 600; fill: #8a94a8; }
      .card-bg { fill: #ffffff; stroke: #c4a052; stroke-width: 2; }
      .card-band { fill: #1F2A44; }
      .mistake-box { fill: #e8dfd2; stroke: #8b6914; stroke-width: 2.5; }
      .between { stroke: #d9d0c4; stroke-width: 1; }
    ]]></style>
  </defs>

  <rect width="1000" height="1910" fill="#F7F4EF"/>

  <!-- Header -->
  <rect width="1000" height="188" fill="url(#hdr)"/>
  <text x="500" y="88" text-anchor="middle" class="t h1">Golden Retriever Daily Guide (By Age)</text>
  <text x="500" y="142" text-anchor="middle" class="t sub">Feeding, sleep &amp; care by age</text>
  <rect x="360" y="162" width="280" height="3" rx="1.5" fill="#C89B3C"/>

  <!-- Food section -->
  <g transform="translate(40, 208)">
    <text x="0" y="0" class="t food-h">Daily food (visual)</text>
    <text x="0" y="26" class="t legend">Each block &#8776; 1 cup | Solid = typical | Faded = flexible / split meals</text>
    <text x="0" y="48" class="t food-note">Totals are typical for standard large-breed kibble. Confirm with your vet.</text>

    <!-- Grid: col0=label, col1+= cups. cell 54x36, gap 10, row height 76 -->
    <g transform="translate(0, 64)">
      <!-- Puppy: 3 cups -->
      <text x="0" y="26" class="t food-label">Puppy</text>
      <g transform="translate(108, 0)">
        <rect x="0" y="0" width="54" height="36" rx="7" fill="#C89B3C" opacity="0.32" stroke="#b88930" stroke-width="2"/>
        <text x="27" y="24" text-anchor="middle" class="t cup-num-f">1</text>
        <rect x="64" y="0" width="54" height="36" rx="7" fill="#C89B3C" opacity="0.32" stroke="#b88930" stroke-width="2"/>
        <text x="91" y="24" text-anchor="middle" class="t cup-num-f">2</text>
        <rect x="128" y="0" width="54" height="36" rx="7" fill="#C89B3C" stroke="#1F2A44" stroke-width="2"/>
        <text x="155" y="24" text-anchor="middle" class="t cup-num">3</text>
      </g>
      <text x="310" y="26" class="t line" style="font-weight:500">3-4 meals | ~2-2.5 cups total</text>

      <!-- Teen -->
      <text x="0" y="102" class="t food-label">Teen</text>
      <g transform="translate(108, 76)">
        <rect x="0" y="0" width="54" height="36" rx="7" fill="#C89B3C" opacity="0.32" stroke="#b88930" stroke-width="2"/>
        <text x="27" y="24" text-anchor="middle" class="t cup-num-f">1</text>
        <rect x="64" y="0" width="54" height="36" rx="7" fill="#C89B3C" stroke="#1F2A44" stroke-width="2"/>
        <text x="91" y="24" text-anchor="middle" class="t cup-num">2</text>
        <rect x="128" y="0" width="54" height="36" rx="7" fill="#C89B3C" stroke="#1F2A44" stroke-width="2"/>
        <text x="155" y="24" text-anchor="middle" class="t cup-num">3</text>
      </g>
      <text x="310" y="102" class="t line" style="font-weight:500">2-3 meals | ~2.5-3.5 cups total</text>

      <!-- Adult: 4 blocks -->
      <text x="0" y="178" class="t food-label">Adult</text>
      <g transform="translate(108, 152)">
        <rect x="0" y="0" width="54" height="36" rx="7" fill="#C89B3C" stroke="#1F2A44" stroke-width="2"/>
        <text x="27" y="24" text-anchor="middle" class="t cup-num">1</text>
        <rect x="64" y="0" width="54" height="36" rx="7" fill="#C89B3C" stroke="#1F2A44" stroke-width="2"/>
        <text x="91" y="24" text-anchor="middle" class="t cup-num">2</text>
        <rect x="128" y="0" width="54" height="36" rx="7" fill="#C89B3C" stroke="#1F2A44" stroke-width="2"/>
        <text x="155" y="24" text-anchor="middle" class="t cup-num">3</text>
        <rect x="192" y="0" width="54" height="36" rx="7" fill="#C89B3C" opacity="0.42" stroke="#C89B3C" stroke-width="2" stroke-dasharray="5 4"/>
        <text x="219" y="24" text-anchor="middle" class="t cup-num-f">4</text>
      </g>
      <text x="310" y="178" class="t line" style="font-weight:500">2 meals | ~3-4 cups total</text>

      <!-- Senior -->
      <text x="0" y="254" class="t food-label">Senior</text>
      <g transform="translate(108, 228)">
        <rect x="0" y="0" width="54" height="36" rx="7" fill="#C89B3C" stroke="#1F2A44" stroke-width="2"/>
        <text x="27" y="24" text-anchor="middle" class="t cup-num">1</text>
        <rect x="64" y="0" width="54" height="36" rx="7" fill="#C89B3C" stroke="#1F2A44" stroke-width="2"/>
        <text x="91" y="24" text-anchor="middle" class="t cup-num">2</text>
        <rect x="128" y="0" width="54" height="36" rx="7" fill="#C89B3C" opacity="0.38" stroke="#b88930" stroke-width="2"/>
        <text x="155" y="24" text-anchor="middle" class="t cup-num-f">3</text>
      </g>
      <text x="310" y="254" class="t line" style="font-weight:500">2 meals | adjust to body condition</text>
    </g>
  </g>

  <!-- Age cards -->
  <g filter="url(#soft)">
    <g transform="translate(40, 568)">
      <rect class="card-bg" width="920" height="258" rx="14"/>
      <rect class="card-band" width="7" height="258" rx="3" x="0" y="0"/>
      <text x="28" y="40" class="t sec-title">Puppy (0-6 months)</text>
      <text x="28" y="72" class="t line">Meals: 3-4x daily</text>
      <text x="28" y="98" class="t line">Sleep: 18-20 hrs</text>
      <text x="28" y="124" class="t line">Exercise: Short play, no forced jumps (5-10 min sessions)</text>
      <text x="28" y="154" class="t rhythm-lbl">Daily rhythm</text>
      <text x="28" y="176" class="t rhythm">Eat &#8594; nap &#8594; play</text>
      <rect class="mistake-box" x="24" y="188" width="872" height="58" rx="10"/>
      <text x="40" y="214" class="t warn">&#9888;</text>
      <text x="72" y="212" class="t mistake-lbl">Biggest mistake</text>
      <text x="72" y="232" class="t mistake">Too much exercise OR no socialization</text>
    </g>

    <line class="between" x1="40" y1="834" x2="960" y2="834"/>

    <g transform="translate(40, 846)">
      <rect class="card-bg" width="920" height="258" rx="14"/>
      <rect class="card-band" width="7" height="258" rx="3"/>
      <text x="28" y="40" class="t sec-title">Teen (6-12 months)</text>
      <text x="28" y="72" class="t line">Meals: 2-3x daily</text>
      <text x="28" y="98" class="t line">Sleep: 14-18 hrs</text>
      <text x="28" y="124" class="t line">Exercise: Build gradually, avoid long runs (walks 20-40 min)</text>
      <text x="28" y="154" class="t rhythm-lbl">Daily rhythm</text>
      <text x="28" y="176" class="t rhythm">Eat &#8594; train &#8594; exercise</text>
      <rect class="mistake-box" x="24" y="188" width="872" height="58" rx="10"/>
      <text x="40" y="214" class="t warn">&#9888;</text>
      <text x="72" y="212" class="t mistake-lbl">Biggest mistake</text>
      <text x="72" y="232" class="t mistake">Treating them like a full adult</text>
    </g>

    <line class="between" x1="40" y1="1112" x2="960" y2="1112"/>

    <g transform="translate(40, 1124)">
      <rect class="card-bg" width="920" height="258" rx="14"/>
      <rect class="card-band" width="7" height="258" rx="3"/>
      <text x="28" y="40" class="t sec-title">Adult (1-7 years)</text>
      <text x="28" y="72" class="t line">Meals: 2x daily</text>
      <text x="28" y="98" class="t line">Sleep: 12-14 hrs</text>
      <text x="28" y="124" class="t line">Exercise: 1-2 hrs daily</text>
      <text x="28" y="154" class="t rhythm-lbl">Daily rhythm</text>
      <text x="28" y="176" class="t rhythm">2 meals + activity blocks</text>
      <rect class="mistake-box" x="24" y="188" width="872" height="58" rx="10"/>
      <text x="40" y="214" class="t warn">&#9888;</text>
      <text x="72" y="212" class="t mistake-lbl">Biggest mistake</text>
      <text x="72" y="232" class="t mistake">No mental work + overfeeding</text>
    </g>

    <line class="between" x1="40" y1="1390" x2="960" y2="1390"/>

    <g transform="translate(40, 1402)">
      <rect class="card-bg" width="920" height="258" rx="14"/>
      <rect class="card-band" width="7" height="258" rx="3"/>
      <text x="28" y="40" class="t sec-title">Senior (7+ years)</text>
      <text x="28" y="72" class="t line">Meals: 2x daily (adjust as needed)</text>
      <text x="28" y="98" class="t line">Sleep: More rest</text>
      <text x="28" y="124" class="t line">Exercise: Short, low-impact</text>
      <text x="28" y="154" class="t rhythm-lbl">Daily rhythm</text>
      <text x="28" y="176" class="t rhythm">Gentle routine + rest</text>
      <rect class="mistake-box" x="24" y="188" width="872" height="58" rx="10"/>
      <text x="40" y="214" class="t warn">&#9888;</text>
      <text x="72" y="212" class="t mistake-lbl">Biggest mistake</text>
      <text x="72" y="232" class="t mistake">Ignoring stiffness signs</text>
    </g>
  </g>

  <!-- Common issues box -->
  <g transform="translate(40, 1680)">
    <rect class="issues-box" x="0" y="0" width="920" height="132" rx="12"/>
    <text x="28" y="34" class="t issues-h">Common issues by age</text>
    <text x="28" y="62" class="t bullet-mark">&#9670;</text>
    <text x="48" y="62" class="t bullet">Puppy: Accidents, chewing, fear</text>
    <text x="28" y="84" class="t bullet-mark">&#9670;</text>
    <text x="48" y="84" class="t bullet">Teen: Testing limits, selective hearing</text>
    <text x="28" y="106" class="t bullet-mark">&#9670;</text>
    <text x="48" y="106" class="t bullet">Adult: Weight gain, boredom</text>
    <text x="28" y="128" class="t bullet-mark">&#9670;</text>
    <text x="48" y="128" class="t bullet">Senior: Joint pain, lumps</text>
  </g>

  <rect x="0" y="1838" width="1000" height="72" fill="#1a2438"/>
  <text x="500" y="1875" text-anchor="middle" class="t foot">GoldenRetriever.hair</text>
  <text x="500" y="1898" text-anchor="middle" class="t foot-sub">Share / save / print - confirm amounts with your veterinarian</text>
</svg>
