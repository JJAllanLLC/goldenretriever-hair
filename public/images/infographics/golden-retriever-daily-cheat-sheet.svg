<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2200" width="1000" height="2200">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2438"/>
      <stop offset="100%" style="stop-color:#243352"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .t { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .h1 { font-size: 42px; font-weight: 800; fill: #F7F4EF; letter-spacing: -0.02em; }
      .sub { font-size: 17px; font-weight: 600; fill: #d4a84a; letter-spacing: 0.05em; text-transform: uppercase; }
      .sec-main { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #1F2A44; letter-spacing: -0.02em; }
      .sec-sub { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 20px; font-weight: 600; fill: #5a6b82; letter-spacing: -0.01em; }
      .food-label { font-size: 18px; font-weight: 800; fill: #1F2A44; }
      .lbl { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #7a8799; }
      .val { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #1F2A44; }
      .legend { font-size: 13px; font-weight: 600; fill: #3d4d66; letter-spacing: 0.01em; }
      .food-h { font-size: 22px; font-weight: 800; fill: #1F2A44; }
      .food-note { font-size: 11px; font-weight: 500; fill: #5a6a82; font-style: italic; }
      .food-sum { font-size: 15px; font-weight: 500; fill: #2c3a52; }
      .cup-num { font-size: 15px; font-weight: 800; fill: #1F2A44; }
      .cup-num-f { font-size: 14px; font-weight: 700; fill: #8a7d62; }
      .cup-num-faded { font-size: 13px; font-weight: 600; fill: #9a948c; }
      .mistake-lbl { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 11px; font-weight: 700; fill: #5a6b82; text-transform: uppercase; letter-spacing: 0.12em; }
      .mistake { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 17px; font-weight: 800; fill: #2a1f14; letter-spacing: -0.01em; }
      .warn { font-size: 24px; font-family: ui-sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif; }
      .issues-title { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 26px; font-weight: 800; fill: #1F2A44; letter-spacing: -0.02em; }
      .cell-age { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #1F2A44; }
      .cell-body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2c3a52; }
      .foot { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #C89B3C; letter-spacing: 0.01em; }
      .foot-sub { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #8f98ac; letter-spacing: 0.02em; }
      .card-bg { fill: #ffffff; stroke: #c4a052; stroke-width: 2; }
      .card-band { fill: #1F2A44; }
      .mistake-box { fill: #f4ebe0; stroke: #6b4e1c; stroke-width: 2; }
      .between { stroke: #d4cbc0; stroke-width: 1; }
      .issues-card { fill: #ffffff; stroke: #c4a052; stroke-width: 2; }
      .footer-rule { stroke: #d4cbc0; stroke-width: 1; }
    ]]></style>
  </defs>

  <rect width="1000" height="2200" fill="#F7F4EF"/>

  <!-- Header -->
  <rect width="1000" height="196" fill="url(#hdr)"/>
  <text x="500" y="90" text-anchor="middle" class="t h1">Golden Retriever Daily Guide (By Age)</text>
  <text x="500" y="144" text-anchor="middle" class="t sub">Feeding, sleep &amp; care by age</text>
  <rect x="340" y="168" width="320" height="3" rx="1.5" fill="#C89B3C"/>

  <!-- Food: fixed block zone = 4ť52 + 3ť8 = 232px; labels x=0; blocks at x=80; summaries x=340 -->
  <g transform="translate(40, 214)">
    <text x="0" y="0" class="t food-h">Daily food (visual)</text>
    <text x="0" y="28" class="t legend">Each block &#8776; 1 cup | Solid = typical | Faded = flexible / split meals</text>
    <text x="0" y="50" class="t food-note">Typical large-breed kibble. Confirm with your vet.</text>

    <g transform="translate(0, 70)">
      <!-- Row 0 Puppy -->
      <text x="0" y="24" class="t food-label">Puppy</text>
      <g transform="translate(80, 0)">
        <rect x="0" y="0" width="52" height="36" rx="8" fill="#efe6d8" stroke="#c9b89a" stroke-width="1.5"/>
        <text x="26" y="24" text-anchor="middle" class="t cup-num-f">1</text>
        <rect x="60" y="0" width="52" height="36" rx="8" fill="#efe6d8" stroke="#c9b89a" stroke-width="1.5"/>
        <text x="86" y="24" text-anchor="middle" class="t cup-num-f">2</text>
        <rect x="120" y="0" width="52" height="36" rx="8" fill="#C89B3C" stroke="#1F2A44" stroke-width="2.5"/>
        <text x="146" y="24" text-anchor="middle" class="t cup-num">3</text>
      </g>
      <text x="340" y="24" class="t food-sum">3&#8211;4 meals | ~2&#8211;2.5 cups total</text>

      <!-- Row 1 Teen -->
      <text x="0" y="120" class="t food-label">Teen</text>
      <g transform="translate(80, 96)">
        <rect x="0" y="0" width="52" height="36" rx="8" fill="#ebe2d4" stroke="#c4b59a" stroke-width="1.5"/>
        <text x="26" y="24" text-anchor="middle" class="t cup-num-f">1</text>
        <rect x="60" y="0" width="52" height="36" rx="8" fill="#C89B3C" stroke="#1F2A44" stroke-width="2.5"/>
        <text x="86" y="24" text-anchor="middle" class="t cup-num">2</text>
        <rect x="120" y="0" width="52" height="36" rx="8" fill="#C89B3C" stroke="#1F2A44" stroke-width="2.5"/>
        <text x="146" y="24" text-anchor="middle" class="t cup-num">3</text>
      </g>
      <text x="340" y="120" class="t food-sum">2&#8211;3 meals | ~2.5&#8211;3.5 cups total</text>

      <!-- Row 2 Adult (4th block stays inside 232px zone; text never before x=340) -->
      <text x="0" y="216" class="t food-label">Adult</text>
      <g transform="translate(80, 192)">
        <rect x="0" y="0" width="52" height="36" rx="8" fill="#C89B3C" stroke="#1F2A44" stroke-width="2.5"/>
        <text x="26" y="24" text-anchor="middle" class="t cup-num">1</text>
        <rect x="60" y="0" width="52" height="36" rx="8" fill="#C89B3C" stroke="#1F2A44" stroke-width="2.5"/>
        <text x="86" y="24" text-anchor="middle" class="t cup-num">2</text>
        <rect x="120" y="0" width="52" height="36" rx="8" fill="#C89B3C" stroke="#1F2A44" stroke-width="2.5"/>
        <text x="146" y="24" text-anchor="middle" class="t cup-num">3</text>
        <rect x="180" y="0" width="52" height="36" rx="8" fill="#f5f3ef" stroke="#d9d4cc" stroke-width="1.5" stroke-dasharray="5 4"/>
        <text x="206" y="24" text-anchor="middle" class="t cup-num-faded">4</text>
      </g>
      <text x="340" y="216" class="t food-sum">2 meals | ~3&#8211;4 cups total</text>

      <!-- Row 3 Senior -->
      <text x="0" y="312" class="t food-label">Senior</text>
      <g transform="translate(80, 288)">
        <rect x="0" y="0" width="52" height="36" rx="8" fill="#C89B3C" stroke="#1F2A44" stroke-width="2.5"/>
        <text x="26" y="24" text-anchor="middle" class="t cup-num">1</text>
        <rect x="60" y="0" width="52" height="36" rx="8" fill="#C89B3C" stroke="#1F2A44" stroke-width="2.5"/>
        <text x="86" y="24" text-anchor="middle" class="t cup-num">2</text>
        <rect x="120" y="0" width="52" height="36" rx="8" fill="#e5d9c8" stroke="#b5a386" stroke-width="1.5"/>
        <text x="146" y="24" text-anchor="middle" class="t cup-num-f">3</text>
      </g>
      <text x="340" y="312" class="t food-sum">2 meals | adjust to body condition</text>
    </g>
  </g>

  <!-- Age cards: H=298, band w=8, inner x=36, line step 26 -->
  <g>
    <g transform="translate(40, 618)">
      <rect class="card-bg" width="920" height="298" rx="14"/>
      <rect class="card-band" x="0" y="0" width="8" height="298" rx="0"/>
      <text x="36" y="52"><tspan class="sec-main">Puppy </tspan><tspan class="sec-sub">(0&#8211;6 months)</tspan></text>
      <text x="36" y="86"><tspan class="lbl">Meals: </tspan><tspan class="val">3&#8211;4x daily</tspan></text>
      <text x="36" y="112"><tspan class="lbl">Sleep: </tspan><tspan class="val">18&#8211;20 hrs</tspan></text>
      <text x="36" y="138"><tspan class="lbl">Exercise: </tspan><tspan class="val">Short play, no forced jumps</tspan></text>
      <text x="36" y="164"><tspan class="lbl">Sessions: </tspan><tspan class="val">5&#8211;10 min</tspan></text>
      <text x="36" y="190"><tspan class="lbl">Daily rhythm: </tspan><tspan class="val">Eat &#8594; nap &#8594; play</tspan></text>
      <rect class="mistake-box" x="28" y="214" width="864" height="72" rx="12"/>
      <text x="48" y="244" class="warn">&#9888;</text>
      <text x="82" y="238" class="mistake-lbl">Biggest mistake</text>
      <text x="82" y="262" class="mistake">Too much exercise OR no socialization</text>
    </g>

    <line class="between" x1="40" y1="928" x2="960" y2="928"/>

    <g transform="translate(40, 940)">
      <rect class="card-bg" width="920" height="298" rx="14"/>
      <rect class="card-band" width="8" height="298"/>
      <text x="36" y="52"><tspan class="sec-main">Teen </tspan><tspan class="sec-sub">(6&#8211;12 months)</tspan></text>
      <text x="36" y="86"><tspan class="lbl">Meals: </tspan><tspan class="val">2&#8211;3x daily</tspan></text>
      <text x="36" y="112"><tspan class="lbl">Sleep: </tspan><tspan class="val">14&#8211;18 hrs</tspan></text>
      <text x="36" y="138"><tspan class="lbl">Exercise: </tspan><tspan class="val">Build gradually</tspan></text>
      <text x="36" y="164"><tspan class="lbl">Walks: </tspan><tspan class="val">20&#8211;40 min</tspan></text>
      <text x="36" y="190"><tspan class="lbl">Daily rhythm: </tspan><tspan class="val">Eat &#8594; train &#8594; exercise</tspan></text>
      <rect class="mistake-box" x="28" y="214" width="864" height="72" rx="12"/>
      <text x="48" y="244" class="warn">&#9888;</text>
      <text x="82" y="238" class="mistake-lbl">Biggest mistake</text>
      <text x="82" y="262" class="mistake">Treating them like a full adult</text>
    </g>

    <line class="between" x1="40" y1="1250" x2="960" y2="1250"/>

    <g transform="translate(40, 1262)">
      <rect class="card-bg" width="920" height="298" rx="14"/>
      <rect class="card-band" width="8" height="298"/>
      <text x="36" y="52"><tspan class="sec-main">Adult </tspan><tspan class="sec-sub">(1&#8211;7 years)</tspan></text>
      <text x="36" y="86"><tspan class="lbl">Meals: </tspan><tspan class="val">2x daily</tspan></text>
      <text x="36" y="112"><tspan class="lbl">Sleep: </tspan><tspan class="val">12&#8211;14 hrs</tspan></text>
      <text x="36" y="138"><tspan class="lbl">Exercise: </tspan><tspan class="val">1&#8211;2 hrs daily</tspan></text>
      <text x="36" y="164"><tspan class="lbl">Daily rhythm: </tspan><tspan class="val">2 meals + activity blocks</tspan></text>
      <rect class="mistake-box" x="28" y="214" width="864" height="72" rx="12"/>
      <text x="48" y="244" class="warn">&#9888;</text>
      <text x="82" y="238" class="mistake-lbl">Biggest mistake</text>
      <text x="82" y="262" class="mistake">No mental work + overfeeding</text>
    </g>

    <line class="between" x1="40" y1="1572" x2="960" y2="1572"/>

    <g transform="translate(40, 1584)">
      <rect class="card-bg" width="920" height="298" rx="14"/>
      <rect class="card-band" width="8" height="298"/>
      <text x="36" y="52"><tspan class="sec-main">Senior </tspan><tspan class="sec-sub">(7+ years)</tspan></text>
      <text x="36" y="86"><tspan class="lbl">Meals: </tspan><tspan class="val">2x daily (adjust)</tspan></text>
      <text x="36" y="112"><tspan class="lbl">Sleep: </tspan><tspan class="val">Increased rest</tspan></text>
      <text x="36" y="138"><tspan class="lbl">Exercise: </tspan><tspan class="val">Short, low-impact</tspan></text>
      <text x="36" y="164"><tspan class="lbl">Daily rhythm: </tspan><tspan class="val">Gentle routine + rest</tspan></text>
      <rect class="mistake-box" x="28" y="214" width="864" height="72" rx="12"/>
      <text x="48" y="244" class="warn">&#9888;</text>
      <text x="82" y="238" class="mistake-lbl">Biggest mistake</text>
      <text x="82" y="262" class="mistake">Ignoring stiffness signs</text>
    </g>
  </g>

  <!-- Common issues: card + 2x2 -->
  <g transform="translate(40, 1904)">
    <rect class="issues-card" width="920" height="188" rx="14"/>
    <rect class="card-band" width="8" height="188"/>
    <text x="36" y="44" class="issues-title">Common issues by age</text>
    <!-- grid: col w 424, gap 24, row0 y=72, row1 y=132 -->
    <text x="36" y="78" class="cell-age">Puppy</text>
    <text x="36" y="98" class="cell-body">Accidents, chewing, fear</text>
    <text x="468" y="78" class="cell-age">Teen</text>
    <text x="468" y="98" class="cell-body">Testing limits, selective hearing</text>
    <text x="36" y="138" class="cell-age">Adult</text>
    <text x="36" y="158" class="cell-body">Weight gain, boredom</text>
    <text x="468" y="138" class="cell-age">Senior</text>
    <text x="468" y="158" class="cell-body">Joint pain, lumps</text>
  </g>

  <line class="footer-rule" x1="40" y1="2108" x2="960" y2="2108"/>

  <rect x="0" y="2110" width="1000" height="90" fill="#1a2438"/>
  <text x="500" y="2150" text-anchor="middle" class="foot">GoldenRetriever.hair</text>
  <text x="500" y="2176" text-anchor="middle" class="foot-sub">Confirm amounts with your veterinarian</text>
</svg>
