<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2620" width="1000" height="2620">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2438"/>
      <stop offset="100%" style="stop-color:#243352"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .t { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .h1 { font-size: 34px; font-weight: 800; fill: #F7F4EF; letter-spacing: -0.02em; }
      .hook { font-size: 17px; font-weight: 500; fill: #b9c5d9; letter-spacing: 0.01em; }
      .sub-support { font-size: 13px; font-weight: 600; fill: #d4a84a; letter-spacing: 0.08em; text-transform: uppercase; }
      .sec-main { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 32px; font-weight: 800; fill: #1F2A44; letter-spacing: -0.02em; }
      .sec-sub { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 19px; font-weight: 600; fill: #5a6b82; letter-spacing: -0.01em; }
      .sec-emoji { font-size: 22px; font-family: ui-sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif; }
      .stage-tag { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #9a7b3a; letter-spacing: 0.02em; }
      .food-label { font-size: 18px; font-weight: 800; fill: #1F2A44; }
      .lbl { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #7a8799; }
      .val { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #1F2A44; }
      .legend { font-size: 13px; font-weight: 600; fill: #3d4d66; letter-spacing: 0.01em; }
      .food-h { font-size: 22px; font-weight: 800; fill: #1F2A44; }
      .food-note { font-size: 11px; font-weight: 500; fill: #5a6a82; font-style: italic; }
      .food-hook { font-size: 13px; font-weight: 700; fill: #a67c28; letter-spacing: 0.04em; }
      .food-sum { font-size: 15px; font-weight: 500; fill: #2c3a52; }
      .food-sum-strong { font-weight: 800; fill: #1a2438; }
      .cup-num { font-size: 16px; font-weight: 800; fill: #141c2e; }
      .cup-num-f { font-size: 15px; font-weight: 700; fill: #6b5c42; }
      .cup-num-faded { font-size: 14px; font-weight: 600; fill: #8a8378; }
      .mistake-lbl { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 11px; font-weight: 700; fill: #5a6b82; text-transform: uppercase; letter-spacing: 0.12em; }
      .mistake { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 17px; font-weight: 800; fill: #2a1f14; letter-spacing: -0.01em; }
      .warn { font-size: 24px; font-family: ui-sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif; }
      .issues-title { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 26px; font-weight: 800; fill: #1F2A44; letter-spacing: -0.02em; }
      .cell-age { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #1F2A44; }
      .cell-body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2c3a52; }
      .foot { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 17px; font-weight: 800; fill: #C89B3C; letter-spacing: 0.01em; }
      .foot-sub { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #8f98ac; letter-spacing: 0.02em; }
      .print-cue { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #7a6f5e; letter-spacing: 0.1em; text-transform: uppercase; }
      .card-bg { fill: #ffffff; stroke: #c4a052; stroke-width: 2; }
      .card-band { fill: #1F2A44; }
      .mistake-box { fill: #f4ebe0; stroke: #6b4e1c; stroke-width: 2; }
      .between { stroke: #d4cbc0; stroke-width: 1; }
      .issues-card { fill: #ffffff; stroke: #c4a052; stroke-width: 2; }
      .footer-rule { stroke: #d4cbc0; stroke-width: 1; }
      .cup-gold { fill: #b8892a; stroke: #141c2e; stroke-width: 3; }
      .cup-muted { fill: #efe6d8; stroke: #b8a88a; stroke-width: 1.5; }
      .cup-muted2 { fill: #ebe2d4; stroke: #b5a688; stroke-width: 1.5; }
      .cup-faded { fill: #faf8f5; stroke: #d8d2c8; stroke-width: 1.5; stroke-dasharray: 5 4; }
      .cup-senior3 { fill: #e8dcc8; stroke: #a08f72; stroke-width: 1.5; }
    ]]></style>
  </defs>

  <rect width="1000" height="2620" fill="#F7F4EF"/>

  <!-- Header -->
  <rect width="1000" height="252" fill="url(#hdr)"/>
  <text x="500" y="72" text-anchor="middle" class="t h1">Golden Retriever Owner Cheat Sheet</text>
  <text x="500" y="118" text-anchor="middle" class="t hook">Exactly what your Golden needs at every stage (in 60 seconds)</text>
  <text x="500" y="158" text-anchor="middle" class="t sub-support">Feeding, sleep &amp; care by age</text>
  <rect x="280" y="182" width="440" height="3" rx="1.5" fill="#C89B3C"/>

  <!-- Food: blocks 56 wide, gap 10, row pitch 124 -->
  <g transform="translate(40, 272)">
    <text x="0" y="0" class="t food-h">How much to feed (visual)</text>
    <text x="0" y="26" class="t legend">Each block &#8776; 1 cup | Solid = typical | Faded = flexible / split meals</text>
    <text x="0" y="48" class="t food-note">Typical large-breed kibble. Confirm with your vet.</text>
    <text x="0" y="72" class="t food-hook">Most searched question &#128071;</text>

    <g transform="translate(0, 94)">
      <!-- Row 0 Puppy -->
      <text x="0" y="28" class="t food-label">Puppy</text>
      <g transform="translate(80, 0)">
        <rect class="cup-muted" x="0" y="0" width="56" height="40" rx="9"/>
        <text x="28" y="26" text-anchor="middle" class="t cup-num-f">1</text>
        <rect class="cup-muted" x="66" y="0" width="56" height="40" rx="9"/>
        <text x="94" y="26" text-anchor="middle" class="t cup-num-f">2</text>
        <rect class="cup-gold" x="132" y="0" width="56" height="40" rx="9"/>
        <text x="160" y="26" text-anchor="middle" class="t cup-num">3</text>
      </g>
      <text x="340" y="28" class="t food-sum">3&#8211;4 meals | <tspan class="food-sum-strong">~2&#8211;2.5 cups total</tspan></text>

      <!-- Row 1 Teen -->
      <text x="0" y="152" class="t food-label">Teen</text>
      <g transform="translate(80, 124)">
        <rect class="cup-muted2" x="0" y="0" width="56" height="40" rx="9"/>
        <text x="28" y="26" text-anchor="middle" class="t cup-num-f">1</text>
        <rect class="cup-gold" x="66" y="0" width="56" height="40" rx="9"/>
        <text x="94" y="26" text-anchor="middle" class="t cup-num">2</text>
        <rect class="cup-gold" x="132" y="0" width="56" height="40" rx="9"/>
        <text x="160" y="26" text-anchor="middle" class="t cup-num">3</text>
      </g>
      <text x="340" y="152" class="t food-sum">2&#8211;3 meals | <tspan class="food-sum-strong">~2.5&#8211;3.5 cups total</tspan></text>

      <!-- Row 2 Adult -->
      <text x="0" y="276" class="t food-label">Adult</text>
      <g transform="translate(80, 248)">
        <rect class="cup-gold" x="0" y="0" width="56" height="40" rx="9"/>
        <text x="28" y="26" text-anchor="middle" class="t cup-num">1</text>
        <rect class="cup-gold" x="66" y="0" width="56" height="40" rx="9"/>
        <text x="94" y="26" text-anchor="middle" class="t cup-num">2</text>
        <rect class="cup-gold" x="132" y="0" width="56" height="40" rx="9"/>
        <text x="160" y="26" text-anchor="middle" class="t cup-num">3</text>
        <rect class="cup-faded" x="198" y="0" width="56" height="40" rx="9"/>
        <text x="226" y="26" text-anchor="middle" class="t cup-num-faded">4</text>
      </g>
      <text x="340" y="276" class="t food-sum">2 meals | <tspan class="food-sum-strong">~3&#8211;4 cups total</tspan></text>

      <!-- Row 3 Senior -->
      <text x="0" y="400" class="t food-label">Senior</text>
      <g transform="translate(80, 372)">
        <rect class="cup-gold" x="0" y="0" width="56" height="40" rx="9"/>
        <text x="28" y="26" text-anchor="middle" class="t cup-num">1</text>
        <rect class="cup-gold" x="66" y="0" width="56" height="40" rx="9"/>
        <text x="94" y="26" text-anchor="middle" class="t cup-num">2</text>
        <rect class="cup-senior3" x="132" y="0" width="56" height="40" rx="9"/>
        <text x="160" y="26" text-anchor="middle" class="t cup-num-f">3</text>
      </g>
      <text x="340" y="400" class="t food-sum">2 meals | <tspan class="food-sum-strong">adjust to body condition</tspan></text>
    </g>
  </g>

  <!-- Age cards: h=318, mistake y=224 h=80 -->
  <g>
    <g transform="translate(40, 808)">
      <rect class="card-bg" width="920" height="318" rx="14"/>
      <rect class="card-band" x="0" y="0" width="8" height="318" rx="0"/>
      <text x="36" y="50" class="t">
        <tspan class="sec-emoji">&#128054;</tspan><tspan class="sec-main" dx="6">Puppy </tspan><tspan class="sec-sub">(0&#8211;6 months)</tspan>
      </text>
      <text x="36" y="78" class="stage-tag">Most work</text>
      <text x="36" y="108"><tspan class="lbl">Meals: </tspan><tspan class="val">3&#8211;4x daily</tspan></text>
      <text x="36" y="134"><tspan class="lbl">Sleep: </tspan><tspan class="val">18&#8211;20 hrs</tspan></text>
      <text x="36" y="160"><tspan class="lbl">Exercise: </tspan><tspan class="val">Short play, no forced jumps</tspan></text>
      <text x="36" y="186"><tspan class="lbl">Sessions: </tspan><tspan class="val">5&#8211;10 min</tspan></text>
      <text x="36" y="212"><tspan class="lbl">Daily rhythm: </tspan><tspan class="val">Eat &#8594; nap &#8594; play</tspan></text>
      <rect class="mistake-box" x="28" y="232" width="864" height="80" rx="12"/>
      <text x="48" y="264" class="warn">&#9888;</text>
      <text x="82" y="256" class="mistake-lbl">Biggest mistake</text>
      <text x="82" y="282" class="mistake">Too much exercise OR no socialization</text>
    </g>

    <line class="between" x1="40" y1="1148" x2="960" y2="1148"/>

    <g transform="translate(40, 1168)">
      <rect class="card-bg" width="920" height="318" rx="14"/>
      <rect class="card-band" width="8" height="318"/>
      <text x="36" y="50" class="t">
        <tspan class="sec-emoji">&#9889;</tspan><tspan class="sec-main" dx="6">Teen </tspan><tspan class="sec-sub">(6&#8211;12 months)</tspan>
      </text>
      <text x="36" y="78" class="stage-tag">Most frustrating</text>
      <text x="36" y="108"><tspan class="lbl">Meals: </tspan><tspan class="val">2&#8211;3x daily</tspan></text>
      <text x="36" y="134"><tspan class="lbl">Sleep: </tspan><tspan class="val">14&#8211;18 hrs</tspan></text>
      <text x="36" y="160"><tspan class="lbl">Exercise: </tspan><tspan class="val">Build gradually</tspan></text>
      <text x="36" y="186"><tspan class="lbl">Walks: </tspan><tspan class="val">20&#8211;40 min</tspan></text>
      <text x="36" y="212"><tspan class="lbl">Daily rhythm: </tspan><tspan class="val">Eat &#8594; train &#8594; exercise</tspan></text>
      <rect class="mistake-box" x="28" y="232" width="864" height="80" rx="12"/>
      <text x="48" y="264" class="warn">&#9888;</text>
      <text x="82" y="256" class="mistake-lbl">Biggest mistake</text>
      <text x="82" y="282" class="mistake">Treating them like a full adult</text>
    </g>

    <line class="between" x1="40" y1="1508" x2="960" y2="1508"/>

    <g transform="translate(40, 1528)">
      <rect class="card-bg" width="920" height="318" rx="14"/>
      <rect class="card-band" width="8" height="318"/>
      <text x="36" y="50" class="t">
        <tspan class="sec-emoji">&#127939;</tspan><tspan class="sec-main" dx="6">Adult </tspan><tspan class="sec-sub">(1&#8211;7 years)</tspan>
      </text>
      <text x="36" y="78" class="stage-tag">Most stable</text>
      <text x="36" y="108"><tspan class="lbl">Meals: </tspan><tspan class="val">2x daily</tspan></text>
      <text x="36" y="134"><tspan class="lbl">Sleep: </tspan><tspan class="val">12&#8211;14 hrs</tspan></text>
      <text x="36" y="160"><tspan class="lbl">Exercise: </tspan><tspan class="val">1&#8211;2 hrs daily</tspan></text>
      <text x="36" y="186"><tspan class="lbl">Daily rhythm: </tspan><tspan class="val">2 meals + activity blocks</tspan></text>
      <rect class="mistake-box" x="28" y="232" width="864" height="80" rx="12"/>
      <text x="48" y="264" class="warn">&#9888;</text>
      <text x="82" y="256" class="mistake-lbl">Biggest mistake</text>
      <text x="82" y="282" class="mistake">No mental work + overfeeding</text>
    </g>

    <line class="between" x1="40" y1="1868" x2="960" y2="1868"/>

    <g transform="translate(40, 1888)">
      <rect class="card-bg" width="920" height="318" rx="14"/>
      <rect class="card-band" width="8" height="318"/>
      <text x="36" y="50" class="t">
        <tspan class="sec-emoji">&#129491;</tspan><tspan class="sec-main" dx="6">Senior </tspan><tspan class="sec-sub">(7+ years)</tspan>
      </text>
      <text x="36" y="78" class="stage-tag">Most overlooked</text>
      <text x="36" y="108"><tspan class="lbl">Meals: </tspan><tspan class="val">2x daily (adjust)</tspan></text>
      <text x="36" y="134"><tspan class="lbl">Sleep: </tspan><tspan class="val">Increased rest</tspan></text>
      <text x="36" y="160"><tspan class="lbl">Exercise: </tspan><tspan class="val">Short, low-impact</tspan></text>
      <text x="36" y="186"><tspan class="lbl">Daily rhythm: </tspan><tspan class="val">Gentle routine + rest</tspan></text>
      <rect class="mistake-box" x="28" y="232" width="864" height="80" rx="12"/>
      <text x="48" y="264" class="warn">&#9888;</text>
      <text x="82" y="256" class="mistake-lbl">Biggest mistake</text>
      <text x="82" y="282" class="mistake">Ignoring stiffness signs</text>
    </g>
  </g>

  <!-- Struggles -->
  <g transform="translate(40, 2238)">
    <rect class="issues-card" width="920" height="200" rx="14"/>
    <rect class="card-band" width="8" height="200"/>
    <text x="36" y="46" class="issues-title">What most owners struggle with</text>
    <text x="36" y="84" class="cell-age">Puppy</text>
    <text x="36" y="106" class="cell-body">Accidents, chewing, fear</text>
    <text x="468" y="84" class="cell-age">Teen</text>
    <text x="468" y="106" class="cell-body">Testing limits, selective hearing</text>
    <text x="36" y="148" class="cell-age">Adult</text>
    <text x="36" y="170" class="cell-body">Weight gain, boredom</text>
    <text x="468" y="148" class="cell-age">Senior</text>
    <text x="468" y="170" class="cell-body">Joint pain, lumps</text>
  </g>

  <text x="500" y="2478" text-anchor="middle" class="t print-cue">Print this &amp; keep it handy</text>

  <line class="footer-rule" x1="40" y1="2506" x2="960" y2="2506"/>

  <rect x="0" y="2508" width="1000" height="106" fill="#1a2438"/>
  <text x="500" y="2552" text-anchor="middle" class="foot">GoldenRetriever.hair &#8212; trusted Golden Retriever guides</text>
  <text x="500" y="2578" text-anchor="middle" class="foot-sub">Confirm amounts with your veterinarian</text>
</svg>
